name: Release PDFs

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          sudo apt-get update -y
          sudo apt-get install -y texlive-full make

      - run: make && make clean

      - uses: softprops/action-gh-release@v2
        with:
          files: "**/*.pdf"