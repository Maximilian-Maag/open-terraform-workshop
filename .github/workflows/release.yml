name: Build PDFs

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -y
          sudo apt-get install -y texlive-full make

      - name: Compile PDFs
        run: make && make clean

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.pdf